spring.application.name=adoptions

# --- Database (PostgreSQL + pgvector + PostgresML) ---
# Avvia con:
# docker run -d -p 5433:5432 --name postgresml \
#   -e POSTGRES_USER=postgres \
#   -e POSTGRES_PASSWORD= \
#   -e POSTGRES_DB=springAI \
#   ghcr.io/postgresml/postgresml:2.9.3

spring.sql.init.mode=always
spring.datasource.url=jdbc:postgresql://localhost:5433/springAI
spring.datasource.username=postgres
spring.datasource.password=

# --- Ollama Embedding Model ---
spring.ai.ollama.embedding.model=nomic-embed-text
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

# --- PgVector Store ---
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=NONE

# --- Chat Memory (JDBC) ---
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# --- Anthropic / Claude ---
# Imposta la variabile d'ambiente:
# export SPRING_AI_ANTHROPIC_API_KEY=sk-ant-...
spring.ai.anthropic.api-key=${SPRING_AI_ANTHROPIC_API_KEY}

# --- Actuator & Observability ---
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# --- Virtual Threads ---
spring.threads.virtual.enabled=true
